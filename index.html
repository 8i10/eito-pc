<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
<title>キャラクター管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root{ --ink:#2A2420; --soft:#6B635B; --faint:#9A9084; --paper:#F2EDE1;
  --card:#FCFAF4; --line:#DCD3C2; --accent:#324A5E; --sel:#E7DECC; }
*{ box-sizing:border-box; }
html,body{ margin:0; }
body{ font-family:'Zen Kaku Gothic New',sans-serif; color:var(--ink);
  background:var(--paper); -webkit-font-smoothing:antialiased; overflow-x:hidden; }
body.no-scroll{ overflow:hidden; }
button{ font-family:inherit; cursor:pointer; }

/* ---- layout ---- */
.app{ display:flex; min-height:100vh; max-width:1100px; margin:0 auto; }

/* sidebar */
.sidebar{ width:236px; flex:none; border-right:1.5px solid var(--ink);
  padding:18px 14px; position:sticky; top:0; align-self:flex-start; height:100vh; overflow:auto; }
.side-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.side-title{ font-weight:700; font-size:15px; letter-spacing:.1em; }
.add-cat{ width:30px; height:30px; border-radius:50%; border:1.5px solid var(--ink);
  background:var(--paper); font-size:18px; line-height:1; display:grid; place-items:center; color:var(--ink); }
.add-cat:hover{ background:var(--ink); color:var(--paper); }
.cat-list{ display:flex; flex-direction:column; gap:2px; }
.cat-item{ display:flex; align-items:center; gap:8px; width:100%; text-align:left; border:none;
  background:none; padding:9px 10px; border-radius:3px; font-size:14px; color:var(--ink); cursor:pointer; }
.cat-label{ flex:0 1 auto; }
.grip,.grip-sp{ width:16px; flex:none; display:inline-flex; justify-content:center; }
.grip{ cursor:grab; touch-action:none; color:var(--faint); font-size:14px; line-height:1; user-select:none; }
.grip:active{ cursor:grabbing; }
.dragging{ opacity:.45; }
.cat-item:hover{ background:#0000000a; }
.cat-item.on{ background:var(--sel); font-weight:700; }
.cat-item .c{ margin-left:auto; font-size:11px; color:var(--faint); font-weight:400; }

/* main */
.main{ flex:1; min-width:0; padding:18px 18px 90px; }
.topbar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  border-bottom:1.5px solid var(--ink); padding-bottom:12px;
  position:sticky; top:0; background:var(--paper); z-index:5; }
.search{ flex:1 1 200px; min-width:140px; padding:9px 12px; border:1px solid var(--line);
  border-radius:2px; background:var(--card); font-family:inherit; font-size:14px; color:var(--ink); }
.search:focus{ outline:2px solid var(--accent); outline-offset:-1px; }
.btn{ padding:9px 13px; border:1px solid var(--ink); background:var(--ink); color:var(--paper);
  border-radius:2px; font-size:13px; font-weight:500; letter-spacing:.03em; white-space:nowrap; }
.btn.ghost{ background:transparent; color:var(--ink); }
.btn.ghost:hover{ background:#0000000a; }
.btn.sm{ padding:6px 9px; font-size:12px; letter-spacing:0; }

/* sync bar (above search) */
.sync-bar{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
  padding:8px 12px; margin:0 0 12px; border-radius:999px; background:var(--card);
  font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1; cursor:pointer; }
.sync-bar:hover{ background:#0000000a; }
.sync-bar .sync-ico{ font-size:13px; }
.sync-bar.s-idle{ color:var(--faint); border:1px solid var(--line); }
.sync-bar.s-go{ color:var(--accent); border:1px solid var(--accent); }
.sync-bar.s-ok{ color:#2E7A5C; border:1px solid #2E7A5C; }
.sync-bar.s-err{ color:#B5472E; border:1px solid #B5472E; }
.toggle{ display:inline-flex; align-items:center; gap:7px; font-size:12.5px; color:var(--soft);
  cursor:pointer; user-select:none; padding:6px 2px; white-space:nowrap; }
.toggle input{ accent-color:var(--accent); width:15px; height:15px; }
#sortBtn{ margin-left:auto; }
.btn.active{ background:var(--ink); color:var(--paper); }
.clan.sortable .clan-head{ cursor:grab; }
.clan.sortable{ background:#00000005; border-radius:3px; }

/* subbar */
.subbar{ display:flex; align-items:center; gap:10px; margin:18px 0 14px; }
.scope{ font-weight:700; font-size:20px; letter-spacing:.05em; }
.spacer{ flex:1; }
.link{ border:none; background:none; color:var(--faint); font-size:12.5px; padding:4px 6px; }
.link:hover{ color:var(--accent); }

/* category section (in すべて view) */
.catsec{ margin-bottom:30px; }
.catsec-head{ display:flex; align-items:baseline; gap:10px; border-top:2px solid var(--ink); padding:7px 0; }
.catsec-name{ font-weight:900; font-size:18px; letter-spacing:.06em; }

/* clan */
.clan{ margin:16px 0 0; }
.clan-head{ display:flex; align-items:center; gap:11px; padding-bottom:8px; border-bottom:1px solid var(--line); }
.seal{ width:28px; height:28px; border-radius:50%; flex:none; display:grid; place-items:center;
  color:#fff; font-weight:700; font-size:13px; box-shadow:inset 0 0 0 2px #ffffff55; }
.clan-name{ font-weight:700; font-size:17px; letter-spacing:.03em; }
.clan-title{ display:flex; flex-direction:column; line-height:1.12; min-width:0; }
.clan-reading{ font-size:9px; color:#A39A8E; letter-spacing:.04em; }
.count{ font-size:11.5px; color:var(--faint); }
.clan-edit{ margin-left:auto; border:none; background:none; color:var(--faint); font-size:12px; padding:4px 6px; }
.clan-edit:hover{ color:var(--accent); }
.clan-note{ font-size:12px; color:var(--soft); margin:7px 0 0; }

/* sibling */
.sib{ margin-top:13px; }
.sib-label{ font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--faint);
  display:flex; align-items:center; gap:8px; margin:0 0 8px; }
.sib-label::after{ content:""; flex:1; height:1px; background:var(--line); }

/* cards */
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(205px,1fr)); gap:10px; }
.card{ position:relative; background:var(--card); border:1px solid var(--line); border-radius:3px;
  padding:13px 14px 13px 17px; text-align:left; overflow:hidden; transition:border-color .12s,transform .12s;
  color:var(--ink); -webkit-text-fill-color:currentColor; font-family:inherit;
  -webkit-appearance:none; appearance:none; -webkit-tap-highlight-color:transparent; }
.card:hover{ border-color:var(--accent); transform:translateY(-1px); }
.card::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--bar,#ccc); }
.name{ font-weight:700; font-size:16px; letter-spacing:.02em; color:var(--ink); }
.reading{ font-size:9px; color:#A39A8E; letter-spacing:.04em; line-height:1.2; margin-bottom:1px; }
.meta{ font-size:11.5px; color:var(--soft); margin-top:3px; }
.desc{ font-size:11px; margin-top:8px; line-height:1.5; white-space:pre-wrap; overflow-wrap:anywhere; color:var(--ink); }

/* misc */
.hint{ color:var(--soft); font-size:13px; padding:14px 4px; }
.empty{ text-align:center; padding:60px 20px; color:var(--soft); }
.empty h2{ font-weight:700; font-size:20px; color:var(--ink); margin:0 0 8px; }
.foot{ margin-top:42px; padding-top:16px; border-top:1px solid var(--line); text-align:center; }
.reset{ background:none; border:none; color:var(--faint); font-size:11.5px; text-decoration:underline; }
.reset:hover{ color:#B5472E; }

/* modal */
.ovl{ position:fixed; inset:0; background:#2a242099; display:grid; place-items:center; padding:16px; z-index:50; }
.modal{ width:100%; max-width:440px; background:var(--paper); border:1.5px solid var(--ink);
  border-radius:4px; max-height:90vh; overflow:auto; }
.modal-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 18px;
  border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--paper); }
.modal-head h3{ font-weight:700; font-size:18px; margin:0; letter-spacing:.05em; }
.x{ border:none; background:none; font-size:22px; line-height:1; color:var(--soft); padding:0 4px; }
.mbody{ padding:18px; }
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:11.5px; font-weight:700; letter-spacing:.06em; color:var(--soft); margin-bottom:5px; }
.in,.sel,.area{ width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:2px;
  background:var(--card); font-family:inherit; font-size:14px; color:var(--ink); }
.in:focus,.sel:focus,.area:focus{ outline:2px solid var(--accent); outline-offset:-1px; }
.area{ resize:vertical; min-height:72px; line-height:1.5; }
.frow{ display:flex; gap:10px; }
.frow>*{ flex:1; }
.sw-wrap{ display:flex; flex-wrap:wrap; gap:8px; }
.sw{ width:30px; height:30px; border-radius:50%; border:2px solid transparent; }
.sw.on{ border-color:var(--ink); box-shadow:0 0 0 2px var(--paper) inset; }
.mactions{ display:flex; gap:10px; justify-content:space-between; align-items:center;
  padding:16px 18px; border-top:1px solid var(--line); position:sticky; bottom:0; background:var(--paper); }
.del{ background:none; border:none; color:#B5472E; font-size:13px; }
.del:hover{ text-decoration:underline; }

/* restored typography */
.side-title,.scope,.catsec-name,.clan-name,.name,.modal-head h3{ font-family:'Shippori Mincho',serif; }
.catsec-name{ font-weight:700; }
.count,.meta,.sib-label,.cat-item .c,.field label{ font-family:'JetBrains Mono',monospace; }

/* custom color picker swatch */
.sw-pick{ position:relative; overflow:hidden; border:2px dashed var(--ink); display:grid; place-items:center; }
.sw-pick.on{ border-style:solid; box-shadow:0 0 0 2px var(--paper) inset; }
.sw-pick input{ position:absolute; inset:0; opacity:0; cursor:pointer; padding:0; border:none; }

/* naming rule line */
.clan-rule{ font-size:11.5px; color:rgba(50,74,94,.62); margin:7px 0 0; font-weight:500; }

/* sync status pill */
.sync-stat{ font-size:11px; font-family:'JetBrains Mono',monospace; padding:4px 9px;
  border-radius:999px; white-space:nowrap; line-height:1; }
.s-idle{ color:var(--faint); border:1px solid var(--line); }
.s-go{ color:var(--accent); border:1px solid var(--accent); }
.s-ok{ color:#2E7A5C; border:1px solid #2E7A5C; }
.s-err{ color:#B5472E; border:1px solid #B5472E; }

/* menu button + scrim (mobile drawer) */
.menu-btn{ display:none; font-size:18px; line-height:1; padding:8px 12px; }
.tb-break{ display:none; }
.scrim{ position:fixed; inset:0; background:#2a242066; z-index:55; opacity:0;
  pointer-events:none; transition:opacity .2s; }
.scrim.show{ opacity:1; pointer-events:auto; }

/* responsive: PCは左固定 / スマホは≡ドロワー・幅固定 */
@media (max-width:720px){
  .app{ display:block; max-width:100%; }
  .main{ padding:14px 14px 90px; width:100%; }
  .menu-btn{ display:inline-grid; place-items:center; margin-left:auto; }
  .tb-break{ display:block; flex-basis:100%; height:0; }
  .grid{ grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); }
  .search,.in,.sel,.area{ font-size:16px; }
  .sidebar{ position:fixed; top:0; right:0; height:100vh; width:min(82vw,300px);
    z-index:60; padding:18px 16px; background:var(--paper);
    border-left:1.5px solid var(--ink); border-right:none;
    box-shadow:-10px 0 26px #00000033; overflow:auto; display:none; }
  .sidebar.open{ display:block; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="side-head">
      <span class="side-title">カテゴリー</span>
      <button class="add-cat" id="addCat" title="カテゴリーを追加">＋</button>
    </div>
    <div class="cat-list" id="catList"></div>
  </aside>
  <main class="main">
    <button class="sync-bar s-idle" id="syncBtn" title="GitHubで同期">
      <span class="sync-ico">☁</span><span id="syncStat">ローカル保存</span>
    </button>
    <div class="topbar">
      <input id="search" class="search" placeholder="名前・一族・続柄で検索" />
      <button class="btn ghost menu-btn" id="menuBtn" title="カテゴリー" aria-label="カテゴリーメニュー">≡</button>
      <span class="tb-break"></span>
      <label class="toggle"><input type="checkbox" id="bySibling" checked /> 兄弟でまとめる</label>
      <button class="btn ghost" id="sortBtn">並べ替え</button>
      <button class="btn" id="addChar">＋人物</button>
    </div>
    <div id="content"></div>
  </main>
</div>
<div class="scrim" id="scrim"></div>

<script>
/* ---------------- 定数・状態 ---------------- */
const KEY = "character_codex_v3";
const NO = "__none__";
const CLAN_COLORS = [
  {name:"茜",hex:"#B5472E"},{name:"瑠璃",hex:"#2F5A9E"},{name:"萌黄",hex:"#5E8C3A"},
  {name:"藤",hex:"#7E6FA6"},{name:"山吹",hex:"#C9962A"},{name:"常磐",hex:"#2E7A5C"},
  {name:"鴇",hex:"#CC7686"},{name:"鈍",hex:"#6E6A63"},
];
let state = { cats:[], clans:[], chars:[] };
let bySibling = true, query = "", selectedCat = "all", sortMode = false;

function uid(){
  try{ if(window.crypto && crypto.randomUUID) return crypto.randomUUID(); }catch(e){}
  return "id_"+Date.now()+"_"+Math.random().toString(36).slice(2,8);
}
const esc = (s) => String(s==null?"":s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ---------------- 保存（Claude内: window.storage / ローカル: localStorage） ---------------- */
async function storeGet(k){
  try{ if(window.storage){ const r = await window.storage.get(k); return (r && r.value) ? r.value : null; } }catch(e){}
  try{ return localStorage.getItem(k); }catch(e){ return null; }
}
async function storeSet(k,v){
  try{ if(window.storage){ await window.storage.set(k,v); return; } }catch(e){}
  try{ localStorage.setItem(k,v); }catch(e){}
}
/* ---------------- GitHub Gist 同期 ---------------- */
const TKEY="cc_gh_token", GKEY="cc_gh_gist", GIST_FILE="character-codex.json";
const sync = { token:"", gistId:"", st:"idle", msg:"" };
let pushTimer = null;

function dataJSON(){
  return JSON.stringify({ app:"character-codex", v:3, updatedAt:Date.now(),
    cats:state.cats, clans:state.clans, chars:state.chars });
}
function applyData(d){ state = { cats:d.cats||[], clans:d.clans||[], chars:d.chars||[] }; }

function setSync(st, msg){ sync.st=st; sync.msg=msg||""; renderSyncStat(); }
function renderSyncStat(){
  const bar = document.getElementById("syncBtn");
  const el = document.getElementById("syncStat");
  if(!bar || !el) return;
  let label, cls;
  if(!(sync.token && sync.gistId)){ cls="s-idle"; label="ローカル保存（タップでGitHub同期）"; }
  else {
    const map = { idle:["待機","s-idle"], syncing:["同期中…","s-go"], ok:["同期済み","s-ok"], error:["同期エラー","s-err"] };
    const m = map[sync.st] || map.idle; label = m[0]; cls = m[1];
  }
  bar.className = "sync-bar " + cls;
  el.textContent = label;
  bar.title = sync.msg || "GitHubで同期";
}

function ghHeaders(){ return {
  "Authorization":"token "+sync.token,
  "Accept":"application/vnd.github+json",
  "Content-Type":"application/json" }; }
async function ghCreate(){
  const res = await fetch("https://api.github.com/gists", { method:"POST", headers:ghHeaders(),
    body: JSON.stringify({ description:"Character Codex データ", public:false, files:{ [GIST_FILE]:{ content:dataJSON() } } }) });
  if(!res.ok) throw new Error("Gist作成に失敗 ("+res.status+")");
  return (await res.json()).id;
}
async function ghPush(){
  const res = await fetch("https://api.github.com/gists/"+sync.gistId, { method:"PATCH", headers:ghHeaders(),
    body: JSON.stringify({ files:{ [GIST_FILE]:{ content:dataJSON() } } }) });
  if(!res.ok) throw new Error("保存に失敗 ("+res.status+")");
}
async function ghPull(){
  const res = await fetch("https://api.github.com/gists/"+sync.gistId, { headers:ghHeaders() });
  if(!res.ok) throw new Error("読込に失敗 ("+res.status+")");
  const j = await res.json(); const f = j.files && j.files[GIST_FILE];
  if(!f) throw new Error("データが見つかりません");
  let c = f.content;
  if(f.truncated && f.raw_url){ c = await (await fetch(f.raw_url)).text(); }
  return JSON.parse(c);
}
function schedulePush(){
  if(!(sync.token && sync.gistId)) return;
  setSync("syncing");
  clearTimeout(pushTimer);
  pushTimer = setTimeout(async ()=>{
    try{ await ghPush(); setSync("ok"); }catch(e){ setSync("error", e.message); }
  }, 1200);
}

async function load(){
  sync.token  = (await storeGet(TKEY)) || "";
  sync.gistId = (await storeGet(GKEY)) || "";
  try{ const v = await storeGet(KEY); if(v){ applyData(JSON.parse(v)); } }catch(e){}
  render(); renderSyncStat();
  if(sync.token && sync.gistId){
    setSync("syncing");
    try{ const d = await ghPull(); applyData(d); await storeSet(KEY, dataJSON()); render(); setSync("ok"); }
    catch(e){ setSync("error", e.message); }
  }
}
async function save(){ storeSet(KEY, dataJSON()); schedulePush(); }

/* ---------------- ヘルパ ---------------- */
const clanById = () => Object.fromEntries(state.clans.map(c=>[c.id,c]));
const catById  = () => Object.fromEntries(state.cats.map(c=>[c.id,c]));
function clanCountByCat(){ const m={}; state.clans.forEach(c=>{ const k=c.catId||NO; m[k]=(m[k]||0)+1; }); return m; }

function matched(){
  const q = query.trim().toLowerCase();
  if(!q) return state.chars;
  const cb = clanById();
  return state.chars.filter(ch=>{
    const cl = cb[ch.clanId]?.name || "";
    return [ch.name,ch.reading,ch.role,ch.sibling,ch.desc,cl].filter(Boolean).join(" ").toLowerCase().includes(q);
  });
}

/* ---------------- カードと一族の描画 ---------------- */
function cardHTML(ch, bar){
  const meta = [ch.age && (ch.age+"歳"), ch.role].filter(Boolean).map(esc).join(" ・ ");
  return `<button class="card" style="--bar:${esc(bar)}" data-char="${ch.id}">
    ${ch.reading?`<div class="reading">${esc(ch.reading)}</div>`:""}
    <div class="name">${esc(ch.name)}</div>
    ${meta?`<div class="meta">${meta}</div>`:""}
    ${ch.desc?`<div class="desc">${esc(ch.desc)}</div>`:""}
  </button>`;
}
function parseAge(s){ if(s==null) return null; const m = String(s).match(/\d+/); return m ? parseInt(m[0],10) : null; }
function byAgeDesc(a,b){
  const pa = parseAge(a.age), pb = parseAge(b.age);
  if(pa==null && pb==null) return 0;
  if(pa==null) return 1;
  if(pb==null) return -1;
  return pb - pa;
}
function siblingBlocks(list){
  const cb = clanById();
  const card = ch => cardHTML(ch, cb[ch.clanId]?.color || "#B7AE9D");
  const sortAge = arr => [...arr].sort(byAgeDesc);
  if(!bySibling) return list.length ? `<div class="sib"><div class="grid">${sortAge(list).map(card).join("")}</div></div>` : "";
  const m = {};
  list.forEach(ch=>{ const s = ch.sibling||NO; (m[s]=m[s]||[]).push(ch); });
  return Object.entries(m)
    .sort((a,b)=> a[0]===NO?1 : b[0]===NO?-1 : a[0].localeCompare(b[0],"ja"))
    .map(([label,items])=>`<div class="sib">
      ${label!==NO?`<div class="sib-label">${esc(label)}</div>`:""}
      <div class="grid">${sortAge(items).map(card).join("")}</div>
    </div>`).join("");
}
function clanHTML(clan, list){
  const sortable = !!clan && sortMode;
  const drag = sortable ? `data-drag="clan" data-id="${clan.id}"` : "";
  return `<section class="clan ${sortable?'sortable':''}" ${drag}>
    <div class="clan-head" ${sortable?'data-grip':''}>
      ${sortable?`<span class="grip">⠿</span>`:""}
      <span class="seal" style="background:${esc(clan?.color||"#B7AE9D")}">${esc((clan?.name||"他").slice(0,1))}</span>
      <span class="clan-title">
        ${clan?.reading?`<span class="clan-reading">${esc(clan.reading)}</span>`:""}
        <span class="clan-name">${esc(clan?.name||"未所属")}</span>
      </span>
      ${(clan && !sortMode)?`<button class="clan-edit" data-clan="${clan.id}">編集</button>`:""}
    </div>
    ${clan?.naming?`<p class="clan-rule">命名規則：${esc(clan.naming)}</p>`:""}
    ${clan?.note?`<p class="clan-note">${esc(clan.note)}</p>`:""}
    ${siblingBlocks(list)}
  </section>`;
}

/* ---------------- サイドバー ---------------- */
function renderSidebar(){
  const el = document.getElementById("catList");
  const cc = clanCountByCat();
  const row = (sel, label, count, drag) =>
    `<div class="cat-item ${selectedCat===sel?'on':''}" data-sel="${sel}" ${drag?`data-drag="cat" data-id="${sel}"`:""}>
       ${drag?`<span class="grip" data-grip>⠿</span>`:`<span class="grip-sp"></span>`}
       <span class="cat-label">${esc(label)}</span><span class="c">${count}</span>
     </div>`;
  let html = row("all", "すべて", state.clans.length, false);
  state.cats.forEach(c=> html += row(c.id, c.name, cc[c.id]||0, true));
  const orphanClans = state.clans.filter(c=>!c.catId).length;
  const orphanChars = state.chars.filter(ch=>!ch.clanId).length;
  if(state.cats.length===0 || orphanClans || orphanChars){
    html += row(NO, "未分類", orphanClans, false);
  }
  el.innerHTML = html;
}

/* ---------------- メイン ---------------- */
function sectionsHTML(){
  const q = query.trim();
  const chars = matched();
  const byClan = {};
  chars.forEach(ch=>{ const k = ch.clanId||NO; (byClan[k]=byClan[k]||[]).push(ch); });

  const listOfClans = (clans) => clans.map(c=>{
    const list = byClan[c.id]||[];
    if(q && list.length===0) return "";
    return clanHTML(c, list);
  }).join("");

  const hint = `<p class="hint">この一覧にはまだ一族がありません。「＋一族」で追加できます。</p>`;

  if(selectedCat==='all'){
    let html = "";
    state.cats.forEach(cat=>{
      const inner = listOfClans(state.clans.filter(c=>c.catId===cat.id));
      if(q && !inner) return;
      html += `<section class="catsec"><div class="catsec-head"><span class="catsec-name">${esc(cat.name)}</span><button class="link" data-cat="${cat.id}">編集</button></div>${inner||hint}</section>`;
    });
    let uc = listOfClans(state.clans.filter(c=>!c.catId));
    if((byClan[NO]||[]).length) uc += clanHTML(null, byClan[NO]);
    if(uc) html += `<section class="catsec"><div class="catsec-head"><span class="catsec-name">未分類</span></div>${uc}</section>`;
    if(q && !html) return `<div class="empty">「${esc(q)}」に一致する人物はいません。</div>`;
    return html;
  }
  if(selectedCat===NO){
    let inner = listOfClans(state.clans.filter(c=>!c.catId));
    if((byClan[NO]||[]).length) inner += clanHTML(null, byClan[NO]);
    if(q && !inner) return `<div class="empty">該当する人物はいません。</div>`;
    return inner || hint;
  }
  const inner = listOfClans(state.clans.filter(c=>c.catId===selectedCat));
  if(q && !inner) return `<div class="empty">該当する人物はいません。</div>`;
  return inner || hint;
}

function renderMain(){
  const content = document.getElementById("content");
  const blank = state.cats.length===0 && state.clans.length===0 && state.chars.length===0;
  if(blank){
    content.innerHTML = `<div class="empty"><h2>台帳はまだ白紙です</h2>
      <p>左上の「＋」でカテゴリーを作り、「＋一族」「＋人物」で書き入れましょう。</p></div>`;
    return;
  }
  if(selectedCat!=='all' && selectedCat!==NO && !catById()[selectedCat]) selectedCat='all';
  const scope = selectedCat==='all' ? "すべて" : selectedCat===NO ? "未分類" : esc(catById()[selectedCat].name);
  const editBtn = (selectedCat!=='all' && selectedCat!==NO) ? `<button class="link" data-cat="${selectedCat}">編集</button>` : "";
  const sub = `<div class="subbar"><span class="scope">${scope}</span>${editBtn}<span class="spacer"></span><button class="btn ghost" data-addclan>＋一族</button></div>`;
  content.innerHTML = sub + sectionsHTML() + `<div class="foot"><button class="reset" data-reset>すべて消去</button></div>`;
}

function render(){ renderSidebar(); renderMain(); }

/* ---------------- モーダル ---------------- */
function openModal(html){
  const ovl = document.createElement("div");
  ovl.className = "ovl";
  ovl.innerHTML = `<div class="modal">${html}</div>`;
  ovl.addEventListener("click", e=>{ if(e.target===ovl) ovl.remove(); });
  ovl.querySelectorAll("[data-close]").forEach(b=> b.addEventListener("click", ()=>ovl.remove()));
  document.body.appendChild(ovl);
  const first = ovl.querySelector("input,select,textarea"); if(first) first.focus();
  return ovl;
}

function catModal(cat){
  const ovl = openModal(`
    <div class="modal-head"><h3>${cat?"カテゴリーを編集":"カテゴリーを追加"}</h3><button class="x" data-close>×</button></div>
    <div class="mbody"><div class="field"><label>名称</label>
      <input class="in" id="f_name" value="${esc(cat?.name||"")}" placeholder="例：神話編 / 王国編" /></div></div>
    <div class="mactions">${cat?`<button class="del" id="f_del">削除</button>`:"<span></span>"}
      <button class="btn" id="f_save">保存</button></div>`);
  const val = ()=> ovl.querySelector("#f_name").value.trim();
  const doSave = ()=>{
    if(!val()) return;
    if(cat){ cat.name = val(); }
    else { const id=uid(); state.cats.push({ id, name:val() }); selectedCat=id; }
    save(); render(); ovl.remove();
  };
  ovl.querySelector("#f_save").onclick = doSave;
  ovl.querySelector("#f_name").addEventListener("keydown", e=>{ if(e.key==="Enter") doSave(); });
  if(cat) ovl.querySelector("#f_del").onclick = ()=>{
    state.cats = state.cats.filter(c=>c.id!==cat.id);
    state.clans.forEach(c=>{ if(c.catId===cat.id) c.catId=""; });
    if(selectedCat===cat.id) selectedCat="all";
    save(); render(); ovl.remove();
  };
}

function clanModal(clan){
  let color = clan?.color || CLAN_COLORS[0].hex;
  const cur = clan ? (clan.catId||"") : ((selectedCat!=='all' && selectedCat!==NO) ? selectedCat : "");
  const catOpts = `<option value="${NO}">未分類</option>` +
    state.cats.map(c=>`<option value="${c.id}" ${cur===c.id?"selected":""}>${esc(c.name)}</option>`).join("");
  const sw = CLAN_COLORS.map(c=>`<button class="sw ${color===c.hex?"on":""}" title="${c.name}" data-hex="${c.hex}" style="background:${c.hex}"></button>`).join("");
  const ovl = openModal(`
    <div class="modal-head"><h3>${clan?"一族を編集":"一族を追加"}</h3><button class="x" data-close>×</button></div>
    <div class="mbody">
      <div class="field"><label>名称</label>
        <input class="in" id="f_name" value="${esc(clan?.name||"")}" placeholder="例：橘家" /></div>
      <div class="field"><label>ふりがな（任意）</label>
        <input class="in" id="f_creading" value="${esc(clan?.reading||"")}" placeholder="例：たちばなけ" /></div>
      <div class="field"><label>カテゴリー</label>
        <select class="sel" id="f_cat">${catOpts}</select></div>
      <div class="field"><label>家紋の色</label>
        <div class="sw-wrap" id="f_sw">${sw}
          <label class="sw sw-pick" title="自由に色を選ぶ" style="background:${esc(color)}">
            <input type="color" id="f_color" value="${esc(color)}" />
          </label>
        </div></div>
      <div class="field"><label>命名規則（任意）</label>
        <input class="in" id="f_naming" value="${esc(clan?.naming||"")}" placeholder="例：女子は『〜子』、男子は『〜之介』" /></div>
      <div class="field"><label>メモ（任意）</label>
        <textarea class="area" id="f_note" placeholder="家風・出自・家訓など">${esc(clan?.note||"")}</textarea></div>
    </div>
    <div class="mactions">${clan?`<button class="del" id="f_del">削除</button>`:"<span></span>"}
      <button class="btn" id="f_save">保存</button></div>`);
  const pick = ovl.querySelector("#f_color");
  const pickWrap = pick.closest(".sw-pick");
  function syncSwatches(){
    let preset = false;
    ovl.querySelectorAll(".sw[data-hex]").forEach(s=>{
      const on = s.dataset.hex.toLowerCase() === color.toLowerCase();
      s.classList.toggle("on", on); if(on) preset = true;
    });
    pickWrap.style.background = color;
    pickWrap.classList.toggle("on", !preset);
  }
  ovl.querySelector("#f_sw").addEventListener("click", e=>{
    const b = e.target.closest("[data-hex]"); if(!b) return;
    color = b.dataset.hex; pick.value = color; syncSwatches();
  });
  pick.addEventListener("input", e=>{ color = e.target.value; syncSwatches(); });
  syncSwatches();
  ovl.querySelector("#f_save").onclick = ()=>{
    const name = ovl.querySelector("#f_name").value.trim(); if(!name) return;
    const cv = ovl.querySelector("#f_cat").value; const cid = cv===NO?"":cv;
    const reading = ovl.querySelector("#f_creading").value.trim();
    const naming = ovl.querySelector("#f_naming").value.trim();
    const note = ovl.querySelector("#f_note").value.trim();
    if(clan){ Object.assign(clan,{ name, reading, catId:cid, color, naming, note }); }
    else state.clans.push({ id:uid(), name, reading, catId:cid, color, naming, note });
    save(); render(); ovl.remove();
  };
  if(clan) ovl.querySelector("#f_del").onclick = ()=>{
    state.clans = state.clans.filter(c=>c.id!==clan.id);
    state.chars.forEach(ch=>{ if(ch.clanId===clan.id) ch.clanId=""; });
    save(); render(); ovl.remove();
  };
}

function charModal(ch){
  const isAdd = !ch;
  let pool = state.clans;
  if(isAdd && selectedCat!=='all' && selectedCat!==NO) pool = state.clans.filter(c=>c.catId===selectedCat);
  else if(isAdd && selectedCat===NO) pool = state.clans.filter(c=>!c.catId);
  const selId = ch ? (ch.clanId||NO)
    : ((selectedCat!=='all' && selectedCat!==NO && pool.length) ? pool[0].id : NO);
  const clanOpts = `<option value="${NO}" ${selId===NO?'selected':''}>未所属</option>` +
    pool.map(c=>`<option value="${c.id}" ${selId===c.id?'selected':''}>${esc(c.name)}</option>`).join("");
  const ovl = openModal(`
    <div class="modal-head"><h3>${ch?"人物を編集":"人物を追加"}</h3><button class="x" data-close>×</button></div>
    <div class="mbody">
      <div class="field"><label>名前</label>
        <input class="in" id="f_name" value="${esc(ch?.name||"")}" placeholder="例：橘 千歳" /></div>
      <div class="field"><label>ふりがな（任意）</label>
        <input class="in" id="f_reading" value="${esc(ch?.reading||"")}" placeholder="例：たちばな ちとせ" /></div>
      <div class="field"><label>一族</label>
        <select class="sel" id="f_clan">${clanOpts}</select></div>
      <div class="field"><label>兄弟グループ（任意）</label>
        <input class="in" id="f_sib" value="${esc(ch?.sibling||"")}" placeholder="例：長子たち / 双子 — 同名で束ねます" /></div>
      <div class="frow">
        <div class="field"><label>続柄・役割</label>
          <input class="in" id="f_role" value="${esc(ch?.role||"")}" placeholder="例：長女" /></div>
        <div class="field"><label>年齢</label>
          <input class="in" id="f_age" value="${esc(ch?.age||"")}" placeholder="例：17" /></div>
      </div>
      <div class="field"><label>説明（任意）</label>
        <textarea class="area" id="f_desc" placeholder="性格・容姿・背景など">${esc(ch?.desc||"")}</textarea></div>
    </div>
    <div class="mactions">${ch?`<button class="del" id="f_del">削除</button>`:"<span></span>"}
      <button class="btn" id="f_save">保存</button></div>`);
  ovl.querySelector("#f_save").onclick = ()=>{
    const name = ovl.querySelector("#f_name").value.trim(); if(!name) return;
    const cv = ovl.querySelector("#f_clan").value;
    const data = { name, reading: ovl.querySelector("#f_reading").value.trim(), clanId: cv===NO?"":cv,
      sibling: ovl.querySelector("#f_sib").value.trim(),
      role: ovl.querySelector("#f_role").value.trim(),
      age: ovl.querySelector("#f_age").value.trim(),
      desc: ovl.querySelector("#f_desc").value.trim() };
    if(ch){ Object.assign(ch, data); }
    else state.chars.push({ id:uid(), ...data });
    save(); render(); ovl.remove();
  };
  if(ch) ovl.querySelector("#f_del").onclick = ()=>{
    state.chars = state.chars.filter(c=>c.id!==ch.id);
    save(); render(); ovl.remove();
  };
}

function syncModal(){
  const ovl = openModal(`
    <div class="modal-head"><h3>GitHubで同期</h3><button class="x" data-close>×</button></div>
    <div class="mbody">
      <p class="hint" style="padding:0 0 12px">PCとスマホで同じデータを編集できます。最初の端末はGist IDを空欄のまま<b>接続</b>すると新しいGistが作られます。表示されたGist IDを、他の端末で同じ<b>トークン</b>と一緒に入力して<b>接続</b>してください。接続後の編集は<b>自動で保存</b>されます。</p>
      <div class="field"><label>アクセストークン（gist権限）</label>
        <input class="in" id="s_token" type="password" placeholder="ghp_..." value="${esc(sync.token)}" /></div>
      <div class="field"><label>Gist ID（空欄なら新規作成）</label>
        <input class="in" id="s_gist" placeholder="例：a1b2c3d4..." value="${esc(sync.gistId)}" /></div>
      <div id="s_status" class="hint" style="padding:2px 0 0"></div>
    </div>
    <div class="mactions" style="flex-wrap:wrap; gap:8px">
      <button class="link" id="s_disc">切断</button>
      <span class="spacer"></span>
      <button class="btn ghost sm" id="s_pull">今すぐ読込</button>
      <button class="btn" id="s_connect">接続</button>
    </div>`);
  const st = ovl.querySelector("#s_status");
  const say = (m, err)=>{ st.textContent = m; st.style.color = err ? "#B5472E" : "var(--accent)"; };
  const grab = ()=>{ sync.token = ovl.querySelector("#s_token").value.trim();
                     sync.gistId = ovl.querySelector("#s_gist").value.trim(); };
  const persist = async ()=>{ await storeSet(TKEY, sync.token); await storeSet(GKEY, sync.gistId); };

  ovl.querySelector("#s_connect").onclick = async ()=>{
    grab(); if(!sync.token){ say("トークンを入力してください", true); return; }
    say("接続中…");
    try{
      await persist();
      if(sync.gistId){
        const d = await ghPull(); applyData(d); await storeSet(KEY, dataJSON()); render();
      }else{
        sync.gistId = await ghCreate(); ovl.querySelector("#s_gist").value = sync.gistId; await persist();
      }
      setSync("ok"); say("接続しました。以降の編集は自動保存されます。Gist ID：" + sync.gistId);
    }catch(e){ setSync("error", e.message); say(e.message, true); }
  };
  ovl.querySelector("#s_pull").onclick = async ()=>{
    grab(); if(!(sync.token && sync.gistId)){ say("トークンとGist IDが必要です", true); return; }
    await persist(); say("読込中…");
    try{ const d = await ghPull(); applyData(d); await storeSet(KEY, dataJSON()); render();
      setSync("ok"); say("クラウドから読み込みました"); }
    catch(e){ setSync("error", e.message); say(e.message, true); }
  };
  ovl.querySelector("#s_disc").onclick = async ()=>{
    sync.token=""; sync.gistId=""; await persist(); setSync("idle");
    ovl.querySelector("#s_token").value=""; ovl.querySelector("#s_gist").value="";
    say("切断しました（この端末のローカル保存のみになります）");
  };
}

document.getElementById("syncBtn").onclick  = ()=> syncModal();
document.getElementById("addCat").onclick  = ()=> catModal(null);
document.getElementById("addChar").onclick = ()=> charModal(null);

const sortBtn = document.getElementById("sortBtn");
function updateSortBtn(){ sortBtn.textContent = sortMode ? "完了" : "並べ替え"; sortBtn.classList.toggle("active", sortMode); }
sortBtn.onclick = ()=>{ sortMode = !sortMode; updateSortBtn(); render(); };
updateSortBtn();
document.getElementById("search").addEventListener("input", e=>{ query = e.target.value; renderMain(); });

document.getElementById("catList").addEventListener("click", e=>{
  if(e.target.closest("[data-grip]")) return;
  const b = e.target.closest("[data-sel]");
  if(b){ selectedCat = b.dataset.sel; closeDrawer(); render(); }
});

document.getElementById("content").addEventListener("click", e=>{
  if(e.target.closest("[data-grip]")) return;
  const ch = e.target.closest("[data-char]"); if(ch){ charModal(state.chars.find(x=>x.id===ch.dataset.char)); return; }
  const cl = e.target.closest("[data-clan]"); if(cl){ clanModal(state.clans.find(x=>x.id===cl.dataset.clan)); return; }
  const ca = e.target.closest("[data-cat]"); if(ca){ catModal(state.cats.find(x=>x.id===ca.dataset.cat)); return; }
  if(e.target.closest("[data-addclan]")){ clanModal(null); return; }
  if(e.target.closest("[data-reset]")){
    if(confirm("すべてのカテゴリー・一族・人物を削除します。よろしいですか？")){
      state = { cats:[], clans:[], chars:[] }; selectedCat="all"; save(); render();
    }
  }
});

/* ---------------- ドロワー（スマホのカテゴリーメニュー） ---------------- */
const sidebarEl = document.querySelector(".sidebar");
const scrimEl = document.getElementById("scrim");
function openDrawer(){ sidebarEl.classList.add("open"); scrimEl.classList.add("show"); document.body.classList.add("no-scroll"); }
function closeDrawer(){ sidebarEl.classList.remove("open"); scrimEl.classList.remove("show"); document.body.classList.remove("no-scroll"); }
document.getElementById("menuBtn").onclick = ()=> sidebarEl.classList.contains("open") ? closeDrawer() : openDrawer();
scrimEl.onclick = closeDrawer;

/* ---------------- ドラッグ並べ替え（カテゴリー・一族 / マウス＆タッチ） ---------------- */
let drag = null;
function reorderSubset(arr, orderedIds){
  const set = new Set(orderedIds);
  const pos = []; arr.forEach((x,i)=>{ if(set.has(x.id)) pos.push(i); });
  const byId = Object.fromEntries(arr.map(x=>[x.id,x]));
  orderedIds.forEach((id,k)=>{ arr[pos[k]] = byId[id]; });
}
function dragSiblings(){
  return [...drag.container.querySelectorAll(":scope > [data-drag='"+drag.type+"']")];
}
function onPtrDown(e){
  const grip = e.target.closest("[data-grip]"); if(!grip) return;
  const item = grip.closest("[data-drag]"); if(!item) return;
  e.preventDefault();
  drag = { item, container:item.parentElement, type:item.dataset.drag };
  item.classList.add("dragging");
  try{ grip.setPointerCapture(e.pointerId); }catch(_){}
  window.addEventListener("pointermove", onPtrMove);
  window.addEventListener("pointerup", onPtrUp, { once:true });
}
function onPtrMove(e){
  if(!drag) return;
  const sibs = dragSiblings().filter(x=>x!==drag.item);
  let placed = false;
  for(const s of sibs){
    const r = s.getBoundingClientRect();
    if(e.clientY < r.top + r.height/2){ drag.container.insertBefore(drag.item, s); placed = true; break; }
  }
  if(!placed){
    const last = sibs[sibs.length-1];
    if(last) drag.container.insertBefore(drag.item, last.nextSibling);
  }
}
function onPtrUp(){
  window.removeEventListener("pointermove", onPtrMove);
  if(!drag) return;
  drag.item.classList.remove("dragging");
  const ids = dragSiblings().map(x=>x.dataset.id);
  if(drag.type==="cat") reorderSubset(state.cats, ids);
  else reorderSubset(state.clans, ids);
  drag = null;
  save(); render();
}
document.addEventListener("pointerdown", onPtrDown);

load();
</script>
